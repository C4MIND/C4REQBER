name: Feature Request
description: Suggest a feature for TURBO-CDI
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Is your feature request related to a problem?
      placeholder: I'm always frustrated when...
  - type: textarea
    attributes:
      label: Describe the solution
      placeholder: A clear description of what you want to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
  - type: dropdown
    attributes:
      label: Priority for you
      options: [Nice to have, Important, Critical]
