name: Build Desktop

on:
  push:
    tags: ['v*']
    paths:
      - 'web-v2/**'
      - 'src-tauri/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: turbo-cdi-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: turbo-cdi-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: turbo-cdi-windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: turbo-cdi-linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install deps
        working-directory: web-v2
        run: npm ci

      - name: Build frontend
        working-directory: web-v2
        run: npm run build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web-v2
          tagName: ${{ github.ref_name }}
          releaseName: 'TURBO-CDI ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: true
          prerelease: false
