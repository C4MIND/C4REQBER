name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify backend imports
        run: |
          PYTHONPATH=src python -c "from src.api.server import app; print('Backend OK')"

      - name: Build backend artifact
        run: |
          mkdir -p dist
          tar czf dist/backend.tar.gz src/ requirements.txt pyproject.toml

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: dist/backend.tar.gz

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-v2/package-lock.json

      - name: Install dependencies
        run: |
          cd web-v2
          npm ci --legacy-peer-deps

      - name: Build frontend
        run: |
          cd web-v2
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: web-v2/dist/

  verify-artifacts:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: dist/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact
          path: web-v2/dist/

      - name: Verify artifacts exist
        run: |
          test -f dist/backend.tar.gz && echo "Backend artifact OK"
          test -d web-v2/dist && echo "Frontend artifact OK"
