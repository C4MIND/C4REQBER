name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov ruff

    - name: Run Ruff lint
      run: ruff check src/ --exclude="archive/"

    - name: Run tests
      env:
        DATABASE_URL: sqlite:///tmp/test.db
        CACHE_BACKEND: memory
        JWT_SECRET: test-secret-min-32-chars-long
      run: |
        PYTHONPATH=src pytest tests/ --cov=src --cov-report=term-missing --cov-config=.coveragerc --cov-fail-under=60 -v --tb=short

  test-tui:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: TUI v9 tests
      working-directory: src/tui/v9
      run: go test ./... -count=1

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-tui]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API Docker image
      run: |
        docker build -f Dockerfile.fullstack -t turbo-cdi-api:${{ github.sha }} .

    - name: Test API container
      run: |
        docker run --rm -e JWT_SECRET=test-secret-min-32-chars-long -e DATABASE_URL=sqlite:///tmp/test.db -e CACHE_BACKEND=memory turbo-cdi-api:${{ github.sha }} python -c "from src.api.server import app; print('OK')"
