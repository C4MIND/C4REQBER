stages:
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DOCKER_DRIVER: overlay2

# ═══════════════════════════════════════════════════════════════
# TEST JOBS
# ═══════════════════════════════════════════════════════════════

test-backend:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y curl git
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-asyncio ruff
  script:
    - ruff check src/ --exclude="archive/" --select=E9,F821,F822,F823
    - PYTHONPATH=. pytest tests/ -v --tb=short
  variables:
    DATABASE_URL: "sqlite:///tmp/test.db"
    CACHE_BACKEND: "memory"
    JWT_SECRET: "test-secret-min-32-chars-long"
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml

# ═══════════════════════════════════════════════════════════════
# BUILD JOBS
# ═══════════════════════════════════════════════════════════════

build-api:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - test-backend
  script:
    - docker build -t $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA .
    - docker build -t $CI_REGISTRY_IMAGE/api:latest .
  only:
    - main
    - develop

# ═══════════════════════════════════════════════════════════════
# DEPLOY JOBS
# ═══════════════════════════════════════════════════════════════

deploy-staging:
  stage: deploy
  image: alpine:latest
  needs:
    - build-api
  script:
    - echo "Deploy to staging environment"
    - echo "docker-compose -f docker-compose.yml up -d"
  environment:
    name: staging
    url: https://staging.turbo-cdi.org
  only:
    - develop

deploy-production:
  stage: deploy
  image: alpine:latest
  needs:
    - build-api
  script:
    - echo "Deploy to production environment"
    - echo "docker-compose -f docker-compose.prod.yml up -d"
  environment:
    name: production
    url: https://turbo-cdi.org
  only:
    - main
  when: manual

# ═══════════════════════════════════════════════════════════════
# TUI v9 — "The Cockpit" (Go bubbletea v2)
# ═══════════════════════════════════════════════════════════════

tui-v9:test:
  stage: test
  image: golang:1.23-alpine
  before_script:
    - apk add --no-cache git
    - cd src/tui/v9
  script:
    - go mod download
    - go test ./... -count=1 -race
  rules:
    - changes:
        - src/tui/v9/**/*

tui-v9:build:
  stage: build
  image: golang:1.23-alpine
  before_script:
    - apk add --no-cache git
    - cd src/tui/v9
  script:
    - go mod download
    - go build -ldflags="-s -w" -o ../../bin/c4tui-v9-${CI_COMMIT_REF_SLUG} ./cmd/c4tui-v9
    - go build -ldflags="-s -w" -o ../../bin/c4tui-v9 ./cmd/c4tui-v9
  artifacts:
    when: always
    paths:
      - bin/c4tui-v9
      - bin/c4tui-v9-${CI_COMMIT_REF_SLUG}
    expire_in: 30 days
  needs:
    - tui-v9:test
  rules:
    - changes:
        - src/tui/v9/**/*

# ═══════════════════════════════════════════════════════════════
# RELEASE — TUI v9 (manual: on git tag like v9.0.0)
# ═══════════════════════════════════════════════════════════════

tui-v9:release:
  stage: deploy
  image: golang:1.23-alpine
  before_script:
    - apk add --no-cache git
  script:
    - cd src/tui/v9
    - go mod download
    - go build -ldflags="-s -w" -o /tmp/c4tui-v9-${CI_COMMIT_REF_NAME}-linux-amd64 ./cmd/c4tui-v9
    - GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o /tmp/c4tui-v9-${CI_COMMIT_REF_NAME}-darwin-arm64 ./cmd/c4tui-v9
    - GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o /tmp/c4tui-v9-${CI_COMMIT_REF_NAME}-windows-amd64.exe ./cmd/c4tui-v9
  artifacts:
    name: "c4tui-v9-${CI_COMMIT_REF_NAME}"
    paths:
      - /tmp/c4tui-v9-*
  rules:
    - if: $CI_COMMIT_TAG =~ /^v9\..*/
  allow_failure: true
