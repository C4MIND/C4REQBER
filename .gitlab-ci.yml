stages:
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DOCKER_DRIVER: overlay2

# ═══════════════════════════════════════════════════════════════
# TEST JOBS
# ═══════════════════════════════════════════════════════════════

test-backend:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y curl git
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-asyncio pytest-timeout ruff mypy
  script:
    # Audit 2026-06-22: lint with strict selection (E9 runtime errors + F pyflakes).
    - ruff check src/ --exclude="archive/" --select=E9,F
    # Truth assertion: docs must match what the code actually has.
    - python3 scripts/gen_truths.py --check
    - python3 scripts/gen_mcp_registry.py --check
    - python3 scripts/check_i18n_parity.py
    # Fast smoke first (catches imports / decorator errors / missing schemas).
    - PYTHONPATH=. pytest tests/mcp_server/ tests/utils/ -v --tb=short
    # Full suite.
    - PYTHONPATH=. pytest tests/ -v --tb=short --junitxml=report.xml
  variables:
    DATABASE_URL: "sqlite:///tmp/test.db"
    CACHE_BACKEND: "memory"
    JWT_SECRET: "test-secret-min-32-chars-long"
    DEV_MODE: "1"  # tests assert on detail.exception_type
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml

tui-v9-test:
  stage: test
  image: golang:1.26
  before_script:
    - cd src/tui/v9
  script:
    - go vet ./...
    - go build ./...
    - go test ./... -count=1
  artifacts:
    when: always
    paths:
      - src/tui/v9/*.test

# ═══════════════════════════════════════════════════════════════
# BUILD JOBS
# ═══════════════════════════════════════════════════════════════

build-api:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - test-backend
  script:
    - docker build -t $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA .
    - docker build -t $CI_REGISTRY_IMAGE/api:latest .
  only:
    - main
    - develop

# ═══════════════════════════════════════════════════════════════
# DEPLOY JOBS
# ═══════════════════════════════════════════════════════════════

deploy-staging:
  stage: deploy
  image: alpine:latest
  needs:
    - build-api
  script:
    - echo "Deploy to staging environment"
    - echo "docker-compose -f docker-compose.yml up -d"
  environment:
    name: staging
    url: https://staging.turbo-cdi.org
  only:
    - develop

deploy-production:
  stage: deploy
  image: alpine:latest
  needs:
    - build-api
  script:
    - echo "Deploy to production environment"
    - echo "docker-compose -f docker-compose.prod.yml up -d"
  environment:
    name: production
    url: https://turbo-cdi.org
  only:
    - main
  when: manual

# ═══════════════════════════════════════════════════════════════
# TUI v9 — "The Cockpit" (Go bubbletea v2)
# ═══════════════════════════════════════════════════════════════

tui-v9:test:
  stage: test
  image: golang:1.23-alpine
  before_script:
    - apk add --no-cache git
    - cd src/tui/v9
  script:
    - go mod download
    - go test ./... -count=1 -race
  rules:
    - changes:
        - src/tui/v9/**/*

tui-v9:build:
  stage: build
  image: golang:1.23-alpine
  before_script:
    - apk add --no-cache git
    - cd src/tui/v9
  script:
    - go mod download
    - go build -ldflags="-s -w" -o ../../bin/c4tui-v9-${CI_COMMIT_REF_SLUG} ./cmd/c4tui-v9
    - go build -ldflags="-s -w" -o ../../bin/c4tui-v9 ./cmd/c4tui-v9
  artifacts:
    when: always
    paths:
      - bin/c4tui-v9
      - bin/c4tui-v9-${CI_COMMIT_REF_SLUG}
    expire_in: 30 days
  needs:
    - tui-v9:test
  rules:
    - changes:
        - src/tui/v9/**/*

# ═══════════════════════════════════════════════════════════════
# RELEASE — TUI v9 (manual: on git tag like v9.0.0)
# ═══════════════════════════════════════════════════════════════

tui-v9:release:
  stage: deploy
  image: golang:1.23-alpine
  before_script:
    - apk add --no-cache git
  script:
    - cd src/tui/v9
    - go mod download
    - go build -ldflags="-s -w" -o /tmp/c4tui-v9-${CI_COMMIT_REF_NAME}-linux-amd64 ./cmd/c4tui-v9
    - GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o /tmp/c4tui-v9-${CI_COMMIT_REF_NAME}-darwin-arm64 ./cmd/c4tui-v9
    - GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o /tmp/c4tui-v9-${CI_COMMIT_REF_NAME}-windows-amd64.exe ./cmd/c4tui-v9
  artifacts:
    name: "c4tui-v9-${CI_COMMIT_REF_NAME}"
    paths:
      - /tmp/c4tui-v9-*
  rules:
    - if: $CI_COMMIT_TAG =~ /^v9\..*/
  allow_failure: true

# ═══════════════════════════════════════════════════════════════
# GitLab Pages — static site (landing/)
# ═══════════════════════════════════════════════════════════════

web-v2:build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  before_script:
    - cd web-v2
    - npm ci || npm install
  script:
    - npm run build
  artifacts:
    paths:
      - web-v2/dist/
    expire_in: 14 days
  rules:
    - changes:
        - web-v2/**/*

pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -r landing/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "feat/production-upgrade"
  needs: []

# ═══════════════════════════════════════════════════════════════
# PyPI PUBLISH (GitLab-native)
# ═══════════════════════════════════════════════════════════════
# Owner action: add CI/CD variables in GitLab UI (Settings → CI/CD → Variables):
#   - PYPI_API_TOKEN       (Protected, Masked) — production PyPI token
#   - TEST_PYPI_API_TOKEN  (Protected, Masked) — TestPyPI token
# Before tagging the first release. Audit 2026-06-22 H-1 (full resolution).
#
# - workflow_dispatch with PYPI_REPO=testpypi → TestPyPI dry-run
# - Tag push v*.*.* → production PyPI
# - Both require the matching CI variable to be present

pypi-publish-test:
  stage: deploy
  image: python:3.11-slim
  before_script:
    - pip install --upgrade pip build twine
  script:
    - python -m build
    - twine check dist/*
    - twine upload --repository testpypi dist/*
  variables:
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: $TEST_PYPI_API_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
      allow_failure: true
  needs: ["test-backend"]
  artifacts:
    paths:
      - dist/

pypi-publish-prod:
  stage: deploy
  image: python:3.11-slim
  before_script:
    - pip install --upgrade pip build twine
  script:
    - python -m build
    - twine check dist/*
    - twine upload dist/*
  variables:
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: $PYPI_API_TOKEN
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs: ["test-backend"]
  artifacts:
    paths:
      - dist/
