stages:
  - test
  - build
  - deploy

default:
  tags: [docker, c4reqber]

variables:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DOCKER_DRIVER: overlay2
  # Kaniko — no DinD; works on macOS Colima runners (privileged=false)
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2-debug"
  API_DOCKERFILE: "Dockerfile.backend"

# ═══════════════════════════════════════════════════════════════
# TEST JOBS
# ═══════════════════════════════════════════════════════════════

test-backend:
  stage: test
  image: python:3.11-slim
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
  before_script:
    - bash scripts/ci/setup_python.sh
  script:
    - ruff check src/ --exclude="archive/" --select=E9,F
    - CI_TRUTHS_SKIP_PYTHON=1 python3 scripts/gen_truths.py --check
    - python3 scripts/gen_mcp_registry.py --check
    - python3 scripts/check_i18n_parity.py
    - PYTHONPATH=. pytest tests/mcp_server/ tests/utils/ tests/publishing/ tests/patterns/test_topic_router.py -v --tb=short
    - PYTHONPATH=. pytest tests/verification/ tests/discovery/ tests/api/ tests/knowledge/ -v --tb=short -m "not slow" --timeout=180 --ignore=tests/knowledge/test_data_sources.py --junitxml=report.xml
  variables:
    DATABASE_URL: "sqlite:///tmp/test.db"
    CACHE_BACKEND: "memory"
    JWT_SECRET: "test-secret-min-32-chars-long"
    DEV_MODE: "1"
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml

tui-v9-test:
  stage: test
  image: golang:1.26
  before_script:
    - cd src/tui/v9
  script:
    - go vet ./...
    - go build ./...
    - go test ./... -count=1 -skip 'Golden'
  artifacts:
    when: always
    paths:
      - src/tui/v9/*.test

# ═══════════════════════════════════════════════════════════════
# BUILD JOBS
# ═══════════════════════════════════════════════════════════════

build-api:
  stage: build
  image:
    name: ${KANIKO_IMAGE}
    entrypoint: [""]
  variables:
    DOCKER_CONFIG: /kaniko/.docker
    DOCKERFILE: ${API_DOCKERFILE}
  needs:
    - job: test-backend
  before_script:
    - chmod +x scripts/ci/build_api_image.sh
  script:
    - bash scripts/ci/build_api_image.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ═══════════════════════════════════════════════════════════════
# DEPLOY JOBS
# ═══════════════════════════════════════════════════════════════

deploy-staging:
  stage: deploy
  image: alpine:latest
  needs:
    - build-api
  script:
    - echo "Deploy to staging environment"
    - echo "docker-compose -f docker-compose.yml up -d"
  environment:
    name: staging
    url: https://staging.turbo-cdi.org
  only:
    - develop

deploy-production:
  stage: deploy
  image: alpine:latest
  needs:
    - job: build-api
  script:
    - 'echo "Production API image pushed to ${CI_REGISTRY_IMAGE}/api:${CI_COMMIT_SHA}"'
    - 'echo "Deploy on host: docker pull ${CI_REGISTRY_IMAGE}/api:latest && docker compose -f docker-compose.prod.yml up -d api"'
  environment:
    name: production
    url: https://turbo-cdi.org
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true

# ═══════════════════════════════════════════════════════════════
# TUI v9 — "The Cockpit" (Go bubbletea v2)
# ═══════════════════════════════════════════════════════════════

tui-v9:test:
  stage: test
  image: golang:1.23-alpine
  before_script:
    - bash scripts/ci/setup_go.sh
  script:
    - cd src/tui/v9
    - go test ./... -count=1 -race -skip 'Golden'
  rules:
    - changes:
        - src/tui/v9/**/*

tui-v9:build:
  stage: build
  image: golang:1.23-alpine
  before_script:
    - bash scripts/ci/setup_go.sh
  script:
    - cd src/tui/v9
    - go build -ldflags="-s -w" -o ../../bin/c4tui-v9-${CI_COMMIT_REF_SLUG} ./cmd/c4tui-v9
    - go build -ldflags="-s -w" -o ../../bin/c4tui-v9 ./cmd/c4tui-v9
  artifacts:
    when: always
    paths:
      - bin/c4tui-v9
      - bin/c4tui-v9-${CI_COMMIT_REF_SLUG}
    expire_in: 30 days
  needs:
    - tui-v9:test
  rules:
    - changes:
        - src/tui/v9/**/*

# ═══════════════════════════════════════════════════════════════
# RELEASE — TUI v9 (manual: on git tag like v9.0.0)
# ═══════════════════════════════════════════════════════════════

tui-v9:release:
  stage: deploy
  image: golang:1.23-alpine
  before_script:
    - bash scripts/ci/setup_go.sh
  script:
    - cd src/tui/v9
    - go build -ldflags="-s -w" -o /tmp/c4tui-v9-${CI_COMMIT_REF_NAME}-linux-amd64 ./cmd/c4tui-v9
    - GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o /tmp/c4tui-v9-${CI_COMMIT_REF_NAME}-darwin-arm64 ./cmd/c4tui-v9
    - GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o /tmp/c4tui-v9-${CI_COMMIT_REF_NAME}-windows-amd64.exe ./cmd/c4tui-v9
  artifacts:
    name: "c4tui-v9-${CI_COMMIT_REF_NAME}"
    paths:
      - /tmp/c4tui-v9-*
  rules:
    - if: $CI_COMMIT_TAG =~ /^v9\..*/
  allow_failure: true

# ═══════════════════════════════════════════════════════════════
# GitLab Pages — static site (landing/)
# ═══════════════════════════════════════════════════════════════

web-v2:build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  before_script:
    - cd web-v2
    - npm ci || npm install
  script:
    - npm run build
  artifacts:
    paths:
      - web-v2/dist/
    expire_in: 14 days
  rules:
    - changes:
        - web-v2/**/*

pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -r landing/. public/
    # Sync repo-root discoveries into Pages (served alongside landing copies)
    - mkdir -p public/repo-discoveries
    - cp -r discoveries/humanity_mission_2026-07-09/. public/repo-discoveries/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: []

# ═══════════════════════════════════════════════════════════════
# PyPI PUBLISH (GitLab-native)
# ═══════════════════════════════════════════════════════════════
# Owner action: add CI/CD variables in GitLab UI (Settings → CI/CD → Variables):
#   - PYPI_API_TOKEN       (Protected, Masked) — production PyPI token
#   - TEST_PYPI_API_TOKEN  (Protected, Masked) — TestPyPI token
# Before tagging the first release. Audit 2026-06-22 H-1 (full resolution).
#
# - workflow_dispatch with PYPI_REPO=testpypi → TestPyPI dry-run
# - Tag push v*.*.* → production PyPI
# - Both require the matching CI variable to be present

pypi-publish-test:
  stage: deploy
  image: python:3.11-slim
  before_script:
    - bash scripts/ci/setup_python.sh
    - pip install build twine
  script:
    - python -m build
    - twine check dist/*
    - twine upload --repository testpypi dist/*
  variables:
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: $TEST_PYPI_API_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
      allow_failure: true
  needs: ["test-backend"]
  artifacts:
    paths:
      - dist/

pypi-publish-prod:
  stage: deploy
  image: python:3.11-slim
  before_script:
    - bash scripts/ci/setup_python.sh
    - pip install build twine
  script:
    - python -m build
    - twine check dist/*
    - twine upload dist/*
  variables:
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: $PYPI_API_TOKEN
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs: ["test-backend"]
  artifacts:
    paths:
      - dist/
