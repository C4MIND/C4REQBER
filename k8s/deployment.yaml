apiVersion: apps/v1
kind: Deployment
metadata:
  name: turbo-cdi-engine
  namespace: turbo-cdi
  labels:
    app: turbo-cdi-engine
    version: v6.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: turbo-cdi-engine
  template:
    metadata:
      labels:
        app: turbo-cdi-engine
        version: v6.0.0
    spec:
      containers:
      - name: engine
        image: turbo-cdi:v6.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: MAX_PARALLEL_SIMULATIONS
          value: "8"
        - name: REDIS_URL
          value: "redis://redis:6379"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: turbo-cdi-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: turbo-cdi-data
  namespace: turbo-cdi
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
