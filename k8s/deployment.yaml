apiVersion: apps/v1
kind: Deployment
metadata:
  name: c4reqber-api
  namespace: c4reqber
  labels:
    app: c4reqber-api
    version: v5.6.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: c4reqber-api
  template:
    metadata:
      labels:
        app: c4reqber-api
        version: v5.6.0
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres.c4reqber.svc.cluster.local -p 5432 -U "$DB_USER"; do
                echo "waiting for postgres..."; sleep 2;
              done
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: c4reqber-secrets
                  key: DB_USER
      containers:
        - name: api
          image: registry.gitlab.com/cognitive-functors/turbo-cdi/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: c4reqber-config
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: c4reqber-secrets
                  key: DATABASE_URL
            - name: DB_HOST
              value: postgres.c4reqber.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: c4reqber-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: c4reqber-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: c4reqber-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: c4reqber-secrets
                  key: JWT_SECRET
            - name: CSRF_SECRET
              valueFrom:
                secretKeyRef:
                  name: c4reqber-secrets
                  key: CSRF_SECRET
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: c4reqber-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: 2000m
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3