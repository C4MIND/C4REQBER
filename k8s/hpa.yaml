apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: c4reqber-api
  namespace: c4reqber
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: c4reqber-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80