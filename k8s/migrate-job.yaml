apiVersion: batch/v1
kind: Job
metadata:
  name: c4reqber-migrate
  namespace: c4reqber
  labels:
    app: c4reqber-migrate
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: c4reqber-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres.c4reqber.svc.cluster.local -p 5432 -U "$DB_USER"; do
                echo "waiting for postgres..."; sleep 2;
              done
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: c4reqber-secrets
                  key: DB_USER
      containers:
        - name: migrate
          image: registry.gitlab.com/cognitive-functors/turbo-cdi/api:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - alembic upgrade head
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: c4reqber-secrets
                  key: DATABASE_URL