[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
norecursedirs = .venv __pycache__ .git .mypy_cache .ruff_cache node_modules .hypothesis
filterwarnings =
    ignore::DeprecationWarning:swigvarlink
    ignore::DeprecationWarning:SwigPyPacked
    ignore::DeprecationWarning:SwigPyObject
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    e2e: marks tests as end-to-end tests (deselect with '-m "not e2e"')
    slow: marks tests as slow (>5s)
    gpu: marks tests requiring GPU
