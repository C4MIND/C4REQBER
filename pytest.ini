[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
# Hang-proofing: no single test may block the suite forever. A runaway/edge-case
# test fails with a clear timeout instead of hanging CI. Generous (60s) so that
# legitimately slow numerical tests still pass; uses thread method so it works
# with blocking C/subprocess calls. Requires pytest-timeout.
timeout = 120
timeout_method = thread
norecursedirs = .venv __pycache__ .git .mypy_cache .ruff_cache node_modules .hypothesis
filterwarnings =
    ignore::DeprecationWarning:swigvarlink
    ignore::DeprecationWarning:SwigPyPacked
    ignore::DeprecationWarning:SwigPyObject
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    e2e: marks tests as end-to-end tests (deselect with '-m "not e2e"')
    slow: marks tests as slow (>5s)
    gpu: marks tests requiring GPU
