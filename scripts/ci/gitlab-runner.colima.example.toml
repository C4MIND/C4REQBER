# Example GitLab Runner config for c4reqber CI on macOS + Colima.
# Install: https://docs.gitlab.com/runner/install/osx.html
# Register with tags: docker,c4reqber
#
# NEVER commit real runner tokens. Copy to ~/.gitlab-runner/config.toml locally.

concurrent = 2
check_interval = 10

[[runners]]
  name = "c4reqber MacBook docker"
  url = "https://gitlab.com"
  token = "REPLACE_WITH_RUNNER_TOKEN"
  executor = "docker"
  tag_list = ["docker", "c4reqber"]
  # One job at a time on this runner — pairs with resource_group: mac-colima in .gitlab-ci.yml
  limit = 1
  # Allow long Kaniko builds (first image push can exceed 1h on Mac ARM)
  maximum_timeout = 10800
  [runners.docker]
    # Colima default socket — adjust username/path if needed
    host = "unix:///Users/YOUR_USER/.colima/default/docker.sock"
    tls_verify = false
    image = "python:3.11-slim"
    privileged = false
    pull_policy = ["if-not-present"]
    volumes = ["/cache"]
    shm_size = 268435456

# Notes:
# - Do NOT use services: docker:dind in .gitlab-ci.yml when host is set above.
# - build-api uses Kaniko and does not require host Docker, but other jobs may.
# - Start Colima before running jobs: colima start
